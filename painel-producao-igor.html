<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Painel de Produção — Mob Edit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0C10;
    --bg-elev: #12151B;
    --bg-card: #171B22;
    --line: #262B34;
    --text: #F2F3F0;
    --muted: #8C93A0;
    --fire: #FF5E1A;
    --fire-soft: rgba(255,94,26,0.14);
    --amber: #FFB627;
    --cyan: #3DA9FC;
    --cyan-soft: rgba(61,169,252,0.14);
    --green: #38D996;
    --green-soft: rgba(56,217,150,0.14);
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body{
    padding: 18px 14px 40px;
    max-width: 560px;
    margin: 0 auto;
  }
  .eyebrow{
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--fire);
  }
  h1{
    font-family:'Rajdhani',sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.01em;
    margin: 2px 0 2px;
    line-height: 1.05;
  }
  .sub{
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }

  /* Battle bar */
  .battlebar-wrap{
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px 16px;
    margin-bottom: 16px;
  }
  .battlebar-head{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 10px;
  }
  .battlebar-title{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .battlebar-count{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size: 15px;
    color: var(--fire);
  }
  .battlebar{
    display:flex; gap:3px;
    height: 16px;
  }
  .seg{
    flex:1;
    background: #21262F;
    border-radius: 3px;
    transition: background .25s ease;
  }
  .seg.on{
    background: linear-gradient(180deg, var(--amber), var(--fire));
    box-shadow: 0 0 8px rgba(255,94,26,0.5);
  }
  .seg.day-divider{ margin-right: 6px; }

  /* Big video toggle card */
  .bv-card{
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .bv-top{
    display:flex; align-items:center; justify-content:space-between;
    gap: 10px;
  }
  .bv-label{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size: 16px;
  }
  .bv-desc{
    color: var(--muted);
    font-size: 12.5px;
    margin-top: 3px;
    line-height:1.4;
  }
  .switch{
    position: relative;
    width: 46px; height: 26px;
    flex-shrink:0;
    background: #262B34;
    border-radius: 20px;
    cursor: pointer;
    transition: background .2s ease;
    border: none;
  }
  .switch.active{ background: var(--fire); }
  .switch::after{
    content:'';
    position:absolute;
    top:3px; left:3px;
    width:20px; height:20px;
    border-radius:50%;
    background: #fff;
    transition: transform .2s ease;
  }
  .switch.active::after{ transform: translateX(20px); }

  .bv-stages{
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
  }
  .stage{
    background: var(--fire-soft);
    border: 1px solid rgba(255,94,26,0.3);
    border-radius: 10px;
    padding: 10px 8px;
    text-align:center;
    cursor: pointer;
  }
  .stage.done{
    background: var(--green-soft);
    border-color: rgba(56,217,150,0.4);
  }
  .stage-num{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size: 12px;
    color: var(--fire);
  }
  .stage.done .stage-num{ color: var(--green); }
  .stage-name{
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    line-height:1.25;
  }

  /* Day cards */
  .day-card{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .day-head{
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
  }
  .day-name{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size: 16px;
  }
  .day-progress{
    font-size: 11px;
    color: var(--muted);
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
  }
  .block{
    display:flex; align-items:flex-start; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
  }
  .block:last-child{ border-bottom:none; }
  .block.disabled{ opacity: 0.4; }
  .chip{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size: 10px;
    letter-spacing:0.04em;
    padding: 2px 7px;
    border-radius: 5px;
    white-space:nowrap;
    margin-top:1px;
  }
  .chip.rest{ background: rgba(140,147,160,0.15); color: var(--muted); }
  .chip.c2{ background: var(--cyan-soft); color: var(--cyan); }
  .chip.ong{ background: var(--fire-soft); color: var(--fire); }
  .block-body{ flex:1; }
  .block-title{ font-size: 13.5px; font-weight:600; }
  .block-time{ font-size: 11.5px; color: var(--muted); margin-top:1px; }
  .checks{ display:flex; gap:6px; margin-top:7px; flex-wrap:wrap; }
  .cbx{
    width: 26px; height: 26px;
    border-radius: 7px;
    border: 1.5px solid var(--line);
    background: transparent;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color: transparent;
    font-size: 14px;
    flex-shrink:0;
  }
  .cbx.c2{ border-color: rgba(61,169,252,0.4); }
  .cbx.ong{ border-color: rgba(255,94,26,0.4); }
  .cbx.on.c2{ background: var(--cyan); border-color: var(--cyan); color: #06131F; }
  .cbx.on.ong{ background: var(--fire); border-color: var(--fire); color: #1A0800; }
  .single-cbx{
    width: 22px; height:22px; border-radius:6px;
    border: 1.5px solid var(--line);
    background:transparent;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:transparent; font-size:13px;
    flex-shrink:0; margin-top: 1px;
  }
  .single-cbx.on{ background: var(--green); border-color: var(--green); color:#04241A; }

  .sun-card{
    background: var(--bg-elev);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align:center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .sun-card b{ color: var(--text); font-family:'Rajdhani',sans-serif; }

  .reset-row{
    text-align:center;
    margin-top: 18px;
  }
  .reset-btn{
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
  }
  .loading{
    text-align:center;
    color: var(--muted);
    padding: 40px 0;
    font-size: 13px;
  }
</style>
</head>
<body>
  <div class="eyebrow">Mob Edit · Painel semanal</div>
  <h1>Sua semana de edição</h1>
  <div class="sub">Toca nos quadradinhos pra marcar o que já foi feito. Fica salvo sozinho.</div>

  <div id="app" class="loading">Carregando painel…</div>

<script>
const DAYS = [
  {key:'seg', name:'Segunda'},
  {key:'ter', name:'Terça'},
  {key:'qua', name:'Quarta'},
  {key:'qui', name:'Quinta'},
  {key:'sex', name:'Sexta'},
  {key:'sab', name:'Sábado'},
];

const STORAGE_KEY = 'painel-igor-v1';

function defaultState(){
  const days = {};
  DAYS.forEach(d => {
    days[d.key] = { descanso:false, c2:[false,false], ong:[false,false,false] };
  });
  return { bigVideo: false, bigStages: [false,false,false], days };
}

let state = defaultState();
const app = document.getElementById('app');

async function load(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state = Object.assign(defaultState(), parsed);
      DAYS.forEach(d=>{
        if(!state.days[d.key]) state.days[d.key] = defaultState().days[d.key];
      });
    }
  }catch(e){
    // no saved state yet, use defaults
  }
  render();
}

async function save(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
  }catch(e){
    console.error('Falha ao salvar', e);
  }
}

function toggleBigVideo(){
  state.bigVideo = !state.bigVideo;
  save(); render();
}
function toggleStage(i){
  state.bigStages[i] = !state.bigStages[i];
  save(); render();
}
function toggleDescanso(dayKey){
  state.days[dayKey].descanso = !state.days[dayKey].descanso;
  save(); render();
}
function toggleC2(dayKey, i){
  state.days[dayKey].c2[i] = !state.days[dayKey].c2[i];
  save(); render();
}
function toggleOng(dayKey, i){
  state.days[dayKey].ong[i] = !state.days[dayKey].ong[i];
  save(); render();
}
function resetWeek(){
  state = defaultState();
  save(); render();
}

function countOng(){
  let n = 0;
  DAYS.forEach(d => state.days[d.key].ong.forEach(v => { if(v) n++; }));
  return n;
}

function render(){
  const totalOng = countOng();
  const stageNames = ['Corte bruto','Edição fina','Finalização'];

  let html = '';

  // Battle bar
  html += `
  <div class="battlebar-wrap">
    <div class="battlebar-head">
      <div class="battlebar-title">Vídeos da ONG na semana</div>
      <div class="battlebar-count">${totalOng} / 18</div>
    </div>
    <div class="battlebar">
      ${DAYS.map(d => state.days[d.key].ong.map(v => `<div class="seg ${v ? 'on':''}"></div>`).join('')).join('<div style="width:6px"></div>')}
    </div>
  </div>`;

  // Big video toggle
  html += `
  <div class="bv-card">
    <div class="bv-top">
      <div>
        <div class="bv-label">Modo Vídeo Grande</div>
        <div class="bv-desc">Ativa quando o cliente 2 mandar um vídeo de 10min+. Os curtos ficam pausados e você foca só nele à tarde.</div>
      </div>
      <button class="switch ${state.bigVideo ? 'active':''}" onclick="toggleBigVideo()"></button>
    </div>
    ${state.bigVideo ? `
    <div class="bv-stages">
      ${[0,1,2].map(i => `
        <div class="stage ${state.bigStages[i] ? 'done':''}" onclick="toggleStage(${i})">
          <div class="stage-num">Dia ${i+1}</div>
          <div class="stage-name">${stageNames[i]}</div>
        </div>
      `).join('')}
    </div>` : ''}
  </div>`;

  // Day cards
  DAYS.forEach(d => {
    const day = state.days[d.key];
    const ongDone = day.ong.filter(Boolean).length;
    html += `
    <div class="day-card">
      <div class="day-head">
        <div class="day-name">${d.name}</div>
        <div class="day-progress">ONG ${ongDone}/3</div>
      </div>

      <div class="block">
        <button class="single-cbx ${day.descanso ? 'on':''}" onclick="toggleDescanso('${d.key}')">${day.descanso ? '✓':''}</button>
        <div class="block-body">
          <div class="block-title">Descanso</div>
          <div class="block-time">13h–14h</div>
        </div>
        <span class="chip rest">PAUSA</span>
      </div>

      <div class="block ${state.bigVideo ? 'disabled' : ''}">
        <div class="block-body">
          <div class="block-title">Cliente 2 — vídeos curtos</div>
          <div class="block-time">14h–18h${state.bigVideo ? ' · pausado (vídeo grande em andamento)' : ''}</div>
          ${!state.bigVideo ? `
          <div class="checks">
            ${[0,1].map(i => `<button class="cbx c2 ${day.c2[i] ? 'on':''}" onclick="toggleC2('${d.key}',${i})">${day.c2[i] ? '✓':''}</button>`).join('')}
          </div>` : ''}
        </div>
        <span class="chip c2">CLIENTE 2</span>
      </div>

      <div class="block">
        <div class="block-body">
          <div class="block-title">ONG Free Fire</div>
          <div class="block-time">19h em diante</div>
          <div class="checks">
            ${[0,1,2].map(i => `<button class="cbx ong ${day.ong[i] ? 'on':''}" onclick="toggleOng('${d.key}',${i})">${day.ong[i] ? '✓':''}</button>`).join('')}
          </div>
        </div>
        <span class="chip ong">ONG</span>
      </div>
    </div>`;
  });

  // Sunday
  html += `
  <div class="sun-card">
    <b>Domingo</b> — livre. Sem prazo, sem cliente. Recarrega.
  </div>`;

  html += `
  <div class="reset-row">
    <button class="reset-btn" onclick="if(confirm('Zerar a semana inteira?')) resetWeek()">Zerar semana</button>
  </div>`;

  app.innerHTML = html;
}

load();
</script>
</body>
</html>
